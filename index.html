<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arionis – Coming Soon</title>
    <meta name="description" content="Arionis – Growth · Unity · Legacy. Coming Soon.">
    <link rel="icon" type="image/png" href="Logo.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #F0E6DD;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .logo {
            width: min(380px, 80vw);
            height: auto;
            animation: fadeInDown 1.2s ease-out;
        }

        .coming-soon {
            margin-top: 2.5rem;
            font-size: clamp(1.5rem, 4vw, 2.4rem);
            font-weight: 300;
            color: #2B4A3F;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            animation: fadeInUp 1.2s ease-out 0.5s both;
        }

        .coming-soon span {
            display: inline-block;
            animation: pulse 2.5s ease-in-out infinite;
        }

        .coming-soon span:nth-child(2) { animation-delay: 0.1s; }
        .coming-soon span:nth-child(3) { animation-delay: 0.2s; }
        .coming-soon span:nth-child(4) { animation-delay: 0.3s; }
        .coming-soon span:nth-child(5) { animation-delay: 0.4s; }
        .coming-soon span:nth-child(6) { animation-delay: 0.5s; }
        .coming-soon span:nth-child(7) { animation-delay: 0.6s; }
        .coming-soon span:nth-child(8) { animation-delay: 0.7s; }
        .coming-soon span:nth-child(9) { animation-delay: 0.8s; }
        .coming-soon span:nth-child(10) { animation-delay: 0.9s; }
        .coming-soon span:nth-child(11) { animation-delay: 1.0s; }
        .coming-soon span:nth-child(12) { animation-delay: 1.1s; }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.4;
                transform: translateY(0);
            }
            50% {
                opacity: 1;
                transform: translateY(-4px);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .logo,
            .coming-soon {
                animation: none;
            }
            .coming-soon span {
                animation: none;
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="Logo.png" alt="Arionis – Growth · Unity · Legacy" class="logo">
        <p class="coming-soon">
            <span>C</span><span>o</span><span>m</span><span>i</span><span>n</span><span>g</span><span>&nbsp;</span><span>S</span><span>o</span><span>o</span><span>n</span><span>!</span>
        </p>
    </div>
</body>
</html>
