<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arionis – Coming Soon</title>
    <meta name="description" content="Arionis – Growth · Unity · Legacy. Coming Soon.">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background-color: #EDE0D3;
            font-family: 'Inter', sans-serif;
        }

        /* ── Video Background (covers entire viewport) ── */
        .video-bg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 0;
            background-color: inherit;
        }

        /* ── Content (over video, bottom area) ── */
        .content {
            position: fixed;
            bottom: 6vh;
            left: 0;
            right: 0;
            z-index: 1;
            text-align: center;
            padding: 0 2rem;
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 1s ease, transform 1s ease;
        }

        .content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .coming-soon {
            font-size: clamp(1.2rem, 3.5vw, 1.8rem);
            font-weight: 700;
            color: #2B4A3F;
            letter-spacing: 0.25em;
            text-transform: uppercase;
        }

        /* ── Socials ── */
        .socials {
            margin-top: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
        }

        .socials a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            color: #2B4A3F;
            transition: color 0.2s ease, transform 0.2s ease;
            cursor: pointer;
        }

        .socials a:hover {
            color: #1a1a1a;
            transform: translateY(-2px);
        }

        .socials a svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        @media (prefers-reduced-motion: reduce) {
            .content {
                transition: none;
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>
<body>

    <!-- Video Background -->
    <video id="introVideo" class="video-bg" autoplay muted playsinline></video>

    <!-- Content (appears after video ends) -->
    <div class="content" id="content">
        <h1 class="coming-soon">Coming Soon</h1>

        <div class="socials">
            <!-- Instagram -->
            <a href="https://instagram.com/arionis" target="_blank" rel="noopener" aria-label="Instagram">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
                </svg>
            </a>
            <!-- TikTok -->
            <a href="https://tiktok.com/@arionis" target="_blank" rel="noopener" aria-label="TikTok">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1v-3.5a6.37 6.37 0 00-.79-.05A6.34 6.34 0 003.15 15.2a6.34 6.34 0 0010.86 4.48V13.2a8.16 8.16 0 005.58 2.2v-3.46a4.85 4.85 0 01-3.77-1.48V6.69h3.77z"/>
                </svg>
            </a>
            <!-- X (Twitter) -->
            <a href="https://x.com/arionis" target="_blank" rel="noopener" aria-label="X">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                </svg>
            </a>
        </div>
    </div>

    <script>
        // ── Video Source (responsive) ──
        const video = document.getElementById('introVideo');
        const content = document.getElementById('content');

        const isMobile = window.innerWidth < 768;
        video.src = isMobile ? 'Arionis-V3-Mobile.mp4' : 'Arionis-V3-LetterStagger.mp4';

        // Match background color to video's first frame
        video.addEventListener('loadeddata', () => {
            try {
                const c = document.createElement('canvas');
                c.width = 1;
                c.height = 1;
                const ctx = c.getContext('2d');
                ctx.drawImage(video, 0, 0, 1, 1);
                const p = ctx.getImageData(0, 0, 1, 1).data;
                const color = `rgb(${p[0]},${p[1]},${p[2]})`;
                document.body.style.backgroundColor = color;
            } catch (e) { /* CORS fallback: keep default */ }
        });

        // Show content at 80% of video duration (20% earlier)
        let contentShown = false;
        video.addEventListener('timeupdate', () => {
            if (!contentShown && video.duration && video.currentTime >= video.duration * 0.6) {
                contentShown = true;
                content.classList.add('visible');
            }
        });

        // Fallback: if video can't play, show content immediately
        video.addEventListener('error', () => {
            video.style.display = 'none';
            content.classList.add('visible');
        });
    </script>
</body>
</html>
